name: Validate Backend

on:
  push:
    branches: ["main"]
    paths:
      - "apps-script/**"
  pull_request:
    paths:
      - "apps-script/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Apps Script manifest exists
        run: test -f apps-script/appsscript.json

      - name: Verify health action exists
        run: grep -q "health" apps-script/src/Code.gs
